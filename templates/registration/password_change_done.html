{% extends 'base.html' %}

{% block title %}Password Changed Successfully - BP Hospitals{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 rounded-3 text-center p-4">
            <div class="card-body">
                <div class="rounded-circle bg-success-subtle text-success d-inline-flex p-3 mb-3">
                    <i class="bi bi-check-circle-fill fs-1"></i>
                </div>
                <h3 class="card-title text-dark font-bold mb-2">Password Changed Successfully!</h3>
                <p class="text-muted mb-4">Your administrative password has been updated. Please use your new password for future logins.</p>
                <a href="{% url 'dashboard' %}" class="btn btn-primary px-4">
                    <i class="bi bi-speedometer2 me-1"></i>Return to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
