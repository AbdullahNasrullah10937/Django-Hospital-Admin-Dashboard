{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - BP Hospitals Admin</title>
    
    <!-- Favicon: BP Hospitals logo icon shown in browser tab -->
    <link rel="icon" type="image/png" href="{% static 'img/logo_icon.png' %}" />
    <link rel="apple-touch-icon" href="{% static 'img/logo_icon.png' %}" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <!-- Custom Theme Stylesheet -->
    <link href="{% static 'css/custom.css' %}" rel="stylesheet"/>
</head>
<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center p-3">
    <div class="card bp-card shadow-lg p-4 p-md-5 border-0 w-100" style="max-width: 440px;">
        <!-- Header / Logo -->
        <div class="text-center mb-4">
            <img src="{% static 'img/logo.png' %}" alt="Inter BP Hospitals – Admin Management System" class="img-fluid mb-2" style="max-height: 75px;" />
            <h4 class="fw-bold text-dark mb-0">BP Hospitals</h4>
            <p class="text-muted small">Admin Management Console</p>
        </div>

        {% if form.errors %}
            <div class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <div class="small">Invalid username or password. Please try again.</div>
            </div>
        {% endif %}

        <!-- Form -->
        <form action="{% url 'login' %}" method="POST" class="needs-validation" novalidate>
            {% csrf_token %}
            <!-- Username -->
            <div class="mb-3">
                <label for="id_username" class="form-label fw-bold text-dark">Username</label>
                <div class="input-group has-validation">
                    <span class="input-group-text bg-light"><i class="bi bi-person text-muted"></i></span>
                    <input type="text" 
                           name="username" 
                           id="id_username" 
                           required 
                           placeholder="admin.user" 
                           class="form-control" />
                    <div class="invalid-feedback">Please enter your username.</div>
                </div>
            </div>

            <!-- Password -->
            <div class="mb-4">
                <label for="id_password" class="form-label fw-bold text-dark">Password</label>
                <div class="input-group has-validation">
                    <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
                    <input type="password" 
                           name="password" 
                           id="id_password" 
                           required 
                           placeholder="••••••••" 
                           class="form-control" />
                    <div class="invalid-feedback">Please enter your password.</div>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold shadow-sm">
                <i class="bi bi-box-arrow-in-right me-1"></i> Login to Console
            </button>
        </form>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
