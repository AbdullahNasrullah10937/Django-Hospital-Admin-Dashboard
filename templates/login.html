{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - BP Hospitals Admin</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#006a69",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#00706f",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#98f2f0",
                        "inverse-primary": "#a1c9ff",
                        "on-error-container": "#93000a",
                        "primary-container": "#0f6fbe",
                        "on-primary-fixed-variant": "#004880",
                        "on-tertiary-fixed": "#301400",
                        "surface-container": "#e7eeff",
                        "primary": "#005698",
                        "surface-dim": "#cfdaf2",
                        "tertiary-container": "#aa5600",
                        "on-secondary-fixed": "#002020",
                        "on-secondary-fixed-variant": "#00504f",
                        "primary-fixed-dim": "#a1c9ff",
                        "surface-container-high": "#dee8ff",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#d3e4ff",
                        "outline": "#717782",
                        "on-background": "#111c2d",
                        "inverse-on-surface": "#ecf1ff",
                        "surface-variant": "#d8e3fb",
                        "on-primary": "#ffffff",
                        "surface-tint": "#0060a8",
                        "on-primary-fixed": "#001c38",
                        "secondary-fixed-dim": "#7cd5d3",
                        "tertiary-fixed": "#ffdcc6",
                        "surface-bright": "#f9f9ff",
                        "tertiary-fixed-dim": "#ffb784",
                        "surface-container-highest": "#d8e3fb",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-tertiary-container": "#ffece2",
                        "inverse-surface": "#263143",
                        "on-tertiary-fixed-variant": "#713700",
                        "tertiary": "#864200",
                        "on-surface": "#111c2d",
                        "surface-container-low": "#f0f3ff",
                        "background": "#f9f9ff",
                        "secondary-container": "#98f2f0",
                        "error": "#ba1a1a",
                        "on-primary-container": "#e9f0ff",
                        "on-surface-variant": "#414751",
                        "outline-variant": "#c1c7d3",
                        "surface": "#f9f9ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "sans": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F8FAFC;
            font-family: 'Inter', sans-serif;
        }
        .card-shadow {
            box-shadow: 0px 2px 4px rgba(30, 41, 59, 0.05);
        }
        .input-ring:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(15, 111, 190, 0.5);
            border-color: #0F6FBE;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <!-- Login Card -->
    <div class="bg-surface-container-lowest rounded-lg card-shadow p-8 w-full max-w-md mx-auto border border-outline-variant/30">
        <!-- Header / Logo -->
        <div class="flex flex-col items-center mb-8">
            <img src="{% static 'img/logo.png' %}" alt="Inter BP Hospitals – Admin Management System" class="h-20 w-auto object-contain mb-2" />
        </div>

        {% if form.errors %}
            <div class="mb-4 p-3 bg-error-container text-on-error-container rounded-lg text-sm font-medium">
                Invalid username or password. Please try again.
            </div>
        {% endif %}

        <!-- Form -->
        <form action="{% url 'login' %}" method="POST" class="space-y-6">
            {% csrf_token %}
            <!-- Username -->
            <div>
                <label for="id_username" class="block text-sm font-bold text-on-surface mb-1">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span class="material-symbols-outlined text-outline-variant text-sm">person</span>
                    </div>
                    <input type="text" name="username" id="id_username" required placeholder="admin.user" class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded bg-surface-container-lowest text-on-surface text-sm input-ring transition-shadow duration-200"/>
                </div>
            </div>

            <!-- Password -->
            <div>
                <div class="flex items-center justify-between mb-1">
                    <label for="id_password" class="block text-sm font-bold text-on-surface">Password</label>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span class="material-symbols-outlined text-outline-variant text-sm">lock</span>
                    </div>
                    <input type="password" name="password" id="id_password" required placeholder="••••••••" class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded bg-surface-container-lowest text-on-surface text-sm input-ring transition-shadow duration-200"/>
                </div>
            </div>

            <!-- Actions -->
            <div class="pt-2">
                <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded bg-[#0F6FBE] text-on-primary font-semibold hover:bg-surface-tint focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200">
                    Login
                </button>
            </div>
        </form>
    </div>
</body>
</html>
